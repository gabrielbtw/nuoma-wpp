services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: ${NUOMA_ENV_FILE:-.env}
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file: ${NUOMA_ENV_FILE:-.env}
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: ${NUOMA_ENV_FILE:-.env}
    ports:
      - "127.0.0.1:9223:9223"
    volumes:
      - ./data:/app/data
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web
