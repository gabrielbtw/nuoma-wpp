<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nuoma WPP Companion</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101615;
        color: #eef7f3;
      }
      body {
        width: 320px;
        margin: 0;
        background: #101615;
      }
      main {
        display: grid;
        gap: 12px;
        padding: 14px;
      }
      h1 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0;
      }
      p {
        margin: 0;
        color: #b7c7c1;
        font-size: 12px;
        line-height: 1.45;
      }
      label {
        display: grid;
        gap: 6px;
        color: #d9e7e2;
        font-size: 11px;
        text-transform: uppercase;
      }
      input {
        min-width: 0;
        border: 1px solid #30433d;
        border-radius: 8px;
        background: #0a0f0e;
        color: #eef7f3;
        font: inherit;
        padding: 9px 10px;
      }
      button {
        min-height: 34px;
        border: 1px solid #2e544e;
        border-radius: 8px;
        background: #14342f;
        color: #eafff9;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row button {
        flex: 1;
      }
      .status {
        border: 1px solid #243b35;
        border-radius: 8px;
        background: #0b1211;
        padding: 10px;
        color: #cfe4dc;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Nuoma WPP Companion</h1>
        <p>Overlay local para WhatsApp Web.</p>
      </div>
      <label>
        API local
        <input id="apiBaseUrl" value="http://127.0.0.1:3001" />
      </label>
      <div class="row">
        <button id="save" type="button">Salvar</button>
        <button id="openWhatsApp" type="button">WhatsApp</button>
      </div>
      <div id="status" class="status">Aguardando Chrome Extension runtime.</div>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
