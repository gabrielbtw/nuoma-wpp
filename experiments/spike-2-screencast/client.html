<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nuoma WPP — CDP Screencast Spike</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0c0d0e;
        color: #f4f5f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }

      main {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 14px;
        border-bottom: 1px solid #24272a;
        background: #111315;
      }

      header strong {
        font-size: 14px;
      }

      header span {
        font-size: 12px;
        color: #a9b0b6;
      }

      #stage {
        position: relative;
        min-height: 0;
        background: #050607;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
        cursor: crosshair;
      }

      #overlay {
        position: absolute;
        right: 12px;
        bottom: 12px;
        min-width: 260px;
        padding: 10px 12px;
        border: 1px solid rgb(255 255 255 / 14%);
        background: rgb(12 13 14 / 86%);
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <strong>CDP Screencast</strong>
        <span id="status">conectando</span>
      </header>
      <section id="stage">
        <canvas id="canvas" tabindex="0"></canvas>
        <div id="overlay"></div>
      </section>
    </main>
    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const overlay = document.getElementById("overlay");

      const stats = {
        frames: 0,
        lastLatencyMs: 0,
        p95LatencyMs: 0,
        latencies: [],
        naturalWidth: 0,
        naturalHeight: 0,
        connectedAt: Date.now()
      };

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.round(rect.width * dpr));
        canvas.height = Math.max(1, Math.round(rect.height * dpr));
      }

      function updateOverlay() {
        overlay.textContent = [
          `frames: ${stats.frames}`,
          `latencia atual: ${Math.round(stats.lastLatencyMs)}ms`,
          `p95 local: ${Math.round(stats.p95LatencyMs)}ms`,
          `frame: ${stats.naturalWidth}x${stats.naturalHeight}`
        ].join("\n");
      }

      function recordLatency(sentAt) {
        const latency = Date.now() - sentAt;
        stats.lastLatencyMs = latency;
        stats.latencies.push(latency);
        if (stats.latencies.length > 240) stats.latencies.shift();
        const sorted = [...stats.latencies].sort((a, b) => a - b);
        stats.p95LatencyMs = sorted[Math.floor(sorted.length * 0.95)] || latency;
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const xRatio = stats.naturalWidth / rect.width;
        const yRatio = stats.naturalHeight / rect.height;
        return {
          x: Math.max(0, Math.round((event.clientX - rect.left) * xRatio)),
          y: Math.max(0, Math.round((event.clientY - rect.top) * yRatio))
        };
      }

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      const ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws/screencast`);

      ws.addEventListener("open", () => {
        statusEl.textContent = "conectado";
        canvas.focus();
      });

      ws.addEventListener("close", () => {
        statusEl.textContent = "desconectado";
      });

      ws.addEventListener("message", async (event) => {
        const message = JSON.parse(event.data);
        if (message.type !== "frame") return;

        recordLatency(message.sentAt);
        const image = new Image();
        image.onload = () => {
          stats.frames += 1;
          stats.naturalWidth = image.naturalWidth;
          stats.naturalHeight = image.naturalHeight;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
          updateOverlay();
        };
        image.src = `data:image/jpeg;base64,${message.data}`;
      });

      function sendInput(payload) {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(payload));
        }
      }

      for (const [domType, cdpType] of [
        ["mousedown", "mousePressed"],
        ["mouseup", "mouseReleased"],
        ["mousemove", "mouseMoved"]
      ]) {
        canvas.addEventListener(domType, (event) => {
          const point = canvasPoint(event);
          sendInput({
            type: "mouse",
            eventType: cdpType,
            x: point.x,
            y: point.y,
            button: event.button === 2 ? "right" : "left",
            clickCount: domType === "mousedown" ? 1 : 0
          });
        });
      }

      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();
        const point = canvasPoint(event);
        sendInput({
          type: "wheel",
          x: point.x,
          y: point.y,
          deltaX: event.deltaX,
          deltaY: event.deltaY
        });
      }, { passive: false });

      window.addEventListener("keydown", (event) => {
        sendInput({ type: "key", eventType: "keyDown", key: event.key, code: event.code, text: event.key.length === 1 ? event.key : undefined });
      });

      window.addEventListener("keyup", (event) => {
        sendInput({ type: "key", eventType: "keyUp", key: event.key, code: event.code });
      });
    </script>
  </body>
</html>
